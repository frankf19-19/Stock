name: ETF 殖利率週更(配息事件彙整)
on:
  workflow_dispatch:
  schedule:
    - cron: "50 0 * * 1"    # 每週一 台北 08:50(配息公告為週頻資訊)
permissions:
  contents: write
jobs:
  dy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4
      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安裝套件
        run: pip install requests
      - name: 彙整殖利率
        env:
          PYTHONUNBUFFERED: "1"
        run: python fetch_dy.py
      - name: 提交結果
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add dy.json 2>/dev/null || true
          git commit -m "ETF 殖利率週更 [CI Skip]" || echo "無變更"
          git pull --rebase origin main || true
          git push || true
