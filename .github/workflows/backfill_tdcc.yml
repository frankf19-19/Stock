name: 大戶持股歷史回補(手動一次性)
on:
  workflow_dispatch:
jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4
      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安裝套件
        run: pip install requests
      - name: 執行回補(約 3~4 小時)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python backfill_tdcc.py
      - name: 提交結果
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -f tdcc.json ]; then git add tdcc.json; fi
          git commit -m "TDCC 歷史回補 [CI Skip]" || echo "無變更"
          git pull --rebase origin main || true
          git push
