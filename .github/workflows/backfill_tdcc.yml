name: 大戶持股週更(TDCC)
on:
  workflow_dispatch:
    inputs:
      reset:
        description: "從頭重跑(true=清除進度重來;預設接續斷點)"
        required: false
        default: "false"
  schedule:
    # ⚠ cron 是 UTC 時間,台北 = UTC+8;台北週六早上 = UTC 週五深夜(星期幾要寫 5)
    # 避開整點(GitHub 整點壅塞常延遲),提早搶跑確保 07:00 前完成
    - cron: "40 22 * * 5"   # UTC 週五 22:40 = 台北週六 06:40(主跑)
    - cron: "25 23 * * 5"   # UTC 週五 23:25 = 台北週六 07:25(第一道保險,主跑被延遲/失敗時補上)
    - cron: "25 23 * * 6"   # UTC 週六 23:25 = 台北週日 07:25(第二道保險;已有當週資料會直接跳過)
permissions:
  contents: write
jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4
      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安裝套件
        run: pip install requests
      - name: 執行回補(進度即時顯示,每150檔自動存檔)
        env:
          PYTHONUNBUFFERED: "1"
          RESET: ${{ github.event.inputs.reset }}
          MODE: ${{ github.event_name == 'schedule' && 'weekly' || '' }}
        run: python backfill_tdcc.py
      - name: 提交結果(保險網)
        if: always()
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add tdcc.json tdcc_state.json 2>/dev/null || true
          git commit -m "TDCC 大戶週更 [CI Skip]" || echo "無變更"
          git pull --rebase origin main || true
          git push || true
