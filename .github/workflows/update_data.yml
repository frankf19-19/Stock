name: 每日資料更新(三力儀表板)

on:
  schedule:
    # 各班次對齊台股官方資料公布時間(UTC+8=台北),公布後最快入站
    - cron: '30 3 * * 1-5'    # 台北 11:30|月營收上午公告即時入站(每月1~10日效果最明顯)
    - cron: '5 7 * * 1-5'     # 台北 15:05|收盤K線+期交所期貨法人(約15:00公布)
    - cron: '10 8 * * 1-5'    # 台北 16:10|三大法人買賣超(T86約16:00公布)
    - cron: '35 9 * * 1-5'    # 台北 17:35|融資融券餘額(約17:30公布)
    - cron: '30 10 * * 1-5'   # 台北 18:30|完整補跑(涵蓋較晚公布/前幾班漏抓的資料)
    - cron: '15 13 * * 1-5'   # 台北 21:15|借券賣出等晚間公布資料,收尾班
    - cron: '30 10 * * 6,0'   # 週末 18:30|月營收 1~10 日假日也會公告,避免延遲到週一
  workflow_dispatch:           # 也可以到 Actions 頁面手動觸發

permissions:
  contents: write

concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install requests pandas yfinance lxml

      - name: 執行每日更新(價格/法人/大戶/營收/評分)
        run: python update_data.py

      - name: 提交結果
        run: |
          git config user.name  "bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json k c
          if [ -f tdcc.json ]; then git add tdcc.json; fi
          if git diff --cached --quiet; then
            echo "沒有變更,略過提交"
            exit 0
          fi
          git commit -m "data: $(TZ=Asia/Taipei date +'%Y-%m-%d')"
          # 與其他排程(盤中報價機器人)可能撞車:
          # -X theirs = 資料檔以「本次剛產生的新版」為準;失敗自動重試 3 次
          for i in 1 2 3; do
            git pull --rebase --autostash -X theirs origin main && git push && exit 0
            echo "推送撞車,10 秒後重試($i/3)…"
            git rebase --abort 2>/dev/null || true
            sleep 10
          done
          echo "::error::推送重試 3 次仍失敗"
          exit 1
